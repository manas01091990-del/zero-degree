
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>ZERO DEGREES KOTA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
      :root {
        --primary: #00C853;
        --bg: #0A0A0A;
      }
      * {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        box-sizing: border-box;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: #0A0A0A;
        color: #F8F9FA;
        -webkit-tap-highlight-color: transparent;
        scroll-behavior: smooth;
        margin: 0;
        padding: 0;
      }
      .glass {
        background: rgba(10, 10, 10, 0.7);
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      
      /* New Advanced Animations */
      @keyframes staggerReveal {
        from { opacity: 0; transform: translateY(20px) skewY(2deg); filter: blur(10px); }
        to { opacity: 1; transform: translateY(0) skewY(0deg); filter: blur(0px); }
      }

      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }

      @keyframes pulseGlow {
        0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 200, 83, 0.4); }
        70% { transform: scale(1.05); box-shadow: 0 0 40px 20px rgba(0, 200, 83, 0); }
        100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 200, 83, 0); }
      }

      @keyframes titleMask {
        from { transform: translateY(100%); }
        to { transform: translateY(0); }
      }

      .animate-stagger {
        animation: staggerReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      .animate-float {
        animation: float 4s ease-in-out infinite;
      }

      .animate-pulse-glow {
        animation: pulseGlow 3s infinite;
      }

      .text-reveal-mask {
        display: inline-block;
        overflow: hidden;
        vertical-align: bottom;
      }

      .text-reveal-mask span {
        display: block;
        animation: titleMask 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      ::selection {
        background: var(--primary);
        color: #000;
      }
    </style>
